# Workflow to test the SemanticVersion class from the `utils` module
name: Testbed - `typing` Module
run-name: ${{ format('{0} - {1}', github.workflow, github.event_name == 'push' && github.event.head_commit.message || 'Manual Run') }}
on:
  workflow_dispatch:
  workflow_call:
  push:
    paths:
    # repo-wide dependencies
    - '.github/actions/test_config/**'
    - 'tests/config/**'
    - 'requirements.txt'
    # specific dependencies
    - '.github/workflows/TEST_utils_typing.yml'
    - 'tests/cases/utils/typing/**'

concurrency:
  group: ${{ github.repository }}-${{ github.ref }}-${{ github.workflow }}-typing
  cancel-in-progress: true

jobs:

  run_testbeds:
    name: Run `typing` Testbed
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        testbed: [
          ConversionsSuite,
        ]
      fail-fast: false # we don't want to cancel just because one testbed fails.
      max-parallel: 20

    steps:
  # 1. Local checkout 
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Get Dependencies
      uses: opengamedata/setup-ogd-py-dependencies@v1.2
      with:
        python_version: ${{ vars.OGD_PYTHON_VERSION }}
    - name: Local self-install
      run: python -m pip install -e .
    - name: Set up Config File
      uses: ./.github/actions/test_config
      with:
          verbose_output: "True"

  # 2. Build & configure remote environments

  # 3. Perform work
    - name: Execute typing Testbed
      uses: opengamedata/actions-execute-testbed@v1.0
      with:
        directory: "tests/cases/utils/typing/${{ matrix.testbed }}"
        test_file: "*Case.py"
        python_version: ${{ vars.OGD_PYTHON_VERSION }}

  # 4. Cleanup & complete
